<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fall Detection Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f8fafc; }
  button { font-family: system-ui, sans-serif; }

  @keyframes cameraBlink {
    0%,100% { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.4); }
    50%      { border-color: transparent; box-shadow: none; }
  }

  .camera-box {
    flex: 1; border-radius: 10px; overflow: hidden;
    background: #0f172a; border: 2px solid #334155;
    position: relative; aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
  }

  .camera-box.blinking {
    animation: cameraBlink 0.5s ease-in-out 6;
    border-color: #ef4444;
  }

  .camera-box img {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; top: 0; left: 0;
  }

  @keyframes fadeInOut {
    0%  { opacity:0; transform:translateX(-50%) translateY(5px); }
    15% { opacity:1; transform:translateX(-50%) translateY(0); }
    80% { opacity:1; }
    100%{ opacity:0; }
  }

  .fall-label {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    background: #ef4444; color: white;
    font-size: 11px; font-weight: 700;
    padding: 3px 12px; border-radius: 20px;
    white-space: nowrap; z-index: 10;
    animation: fadeInOut 3.5s ease forwards;
  }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(-10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .alert-card-new { animation: slideIn 0.4s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SERVER = "http://localhost:5000";

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

function StatusBadge({ status }) {
  const isNew = status === "unacknowledged";
  return (
    <span style={{ padding:"3px 10px", borderRadius:20, fontSize:12, fontWeight:600,
      background:isNew?"#fee2e2":"#dcfce7", color:isNew?"#dc2626":"#16a34a",
      display:"inline-flex", alignItems:"center", gap:5 }}>
      <span style={{ width:7, height:7, borderRadius:"50%",
        background:isNew?"#dc2626":"#16a34a", display:"inline-block" }}/>
      {isNew ? "NEW" : "Resolved"}
    </span>
  );
}

function AlertCard({ alert, onAcknowledge, isLatest }) {
  const isNew = alert.status === "unacknowledged";
  return (
    <div className={isLatest ? "alert-card-new" : ""}
      style={{ background:"#fff", borderRadius:12, padding:"16px 20px",
        border:`1px solid ${isNew?"#fca5a5":"#e5e7eb"}`,
        boxShadow:isNew?"0 0 0 3px #fee2e2":"0 1px 3px rgba(0,0,0,0.07)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ display:"flex", gap:14, alignItems:"center" }}>
          <div style={{ width:44, height:44, borderRadius:10,
            background:isNew?"#fee2e2":"#f3f4f6",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>
            {isNew ? "⚠️" : "✅"}
          </div>
          <div>
            <div style={{ fontWeight:700, fontSize:15, color:"#111" }}>
              Person #{alert.person_id} — Fall Detected
            </div>
            <div style={{ color:"#6b7280", fontSize:13, marginTop:3 }}>
              📍 {alert.location} &nbsp;·&nbsp; 🕐 {alert.timestamp}
            </div>
          </div>
        </div>
        <StatusBadge status={alert.status} />
      </div>
      {/* Show snapshot if available */}
      {alert.snapshot && isNew && (
        <img src={alert.snapshot} alt="Fall snapshot"
          style={{ width:"100%", borderRadius:8, marginTop:10, maxHeight:140, objectFit:"cover" }}/>
      )}
      {isNew && (
        <button onClick={() => onAcknowledge(alert.alert_id)}
          style={{ marginTop:12, width:"100%", padding:"8px 0", borderRadius:8,
            background:"#2563eb", color:"#fff", border:"none",
            fontWeight:600, fontSize:13, cursor:"pointer" }}>
          ✓ Acknowledge & Mark Resolved
        </button>
      )}
    </div>
  );
}

function StatCard({ icon, label, value, color }) {
  return (
    <div style={{ background:"#fff", borderRadius:12, padding:"18px 22px",
      border:"1px solid #e5e7eb", boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}>
      <div style={{ fontSize:26, marginBottom:8 }}>{icon}</div>
      <div style={{ fontSize:26, fontWeight:800, color:color||"#111" }}>{value}</div>
      <div style={{ fontSize:13, color:"#6b7280", marginTop:4 }}>{label}</div>
    </div>
  );
}

function CameraFeed({ name, blinking, personId, streamUrl }) {
  const [showLabel, setShowLabel] = useState(false);
  const [labelKey, setLabelKey] = useState(0);

  useEffect(() => {
    if (blinking) {
      setShowLabel(true);
      setLabelKey(k => k+1);
      const t = setTimeout(() => setShowLabel(false), 3500);
      return () => clearTimeout(t);
    }
  }, [blinking, personId]);

  return (
    <div className={`camera-box ${blinking?"blinking":""}`}>
      {/* Live camera stream */}
      {streamUrl && <img src={streamUrl} alt="Live feed" />}

      {/* Labels */}
      <div style={{ position:"absolute", top:8, left:8, zIndex:5,
        background:"rgba(0,0,0,0.6)", color:"#fff",
        fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4 }}>
        {name}
      </div>
      <div style={{ position:"absolute", top:8, right:8, zIndex:5,
        background:blinking?"#ef4444":"#22c55e",
        color:"#fff", fontSize:10, fontWeight:700,
        padding:"2px 8px", borderRadius:4, transition:"background 0.3s" }}>
        {blinking ? "⚠ FALL" : "● LIVE"}
      </div>

      {/* Placeholder when no stream */}
      {!streamUrl && (
        <div style={{ textAlign:"center", color:blinking?"#ef4444":"#475569" }}>
          <div style={{ fontSize:32, marginBottom:6 }}>{blinking?"🚨":"📷"}</div>
          <div style={{ fontSize:13, fontWeight:600, color:blinking?"#ef4444":"#475569" }}>{name}</div>
          <div style={{ fontSize:11, marginTop:4, color:"#6b7280" }}>
            {blinking ? `Person #${personId} FELL!` : "Start server to see feed"}
          </div>
        </div>
      )}

      {showLabel && (
        <div key={labelKey} className="fall-label">
          ⚠️ FALL DETECTED — Person #{personId}
        </div>
      )}
    </div>
  );
}

function App() {
  const [alerts, setAlerts] = useState([]);
  const [filter, setFilter] = useState("all");
  const [connected, setConnected] = useState(false);
  const [cam1Blink, setCam1Blink] = useState(false);
  const [cam2Blink, setCam2Blink] = useState(false);
  const [cam1Person, setCam1Person] = useState(null);
  const [cam2Person, setCam2Person] = useState(null);
  const [latestId, setLatestId] = useState(null);
  const socketRef = useRef(null);

  function triggerBlink(location, personId) {
    if (location === "Camera-1") {
      setCam1Person(personId); setCam1Blink(true);
      setTimeout(() => setCam1Blink(false), 4000);
    } else {
      setCam2Person(personId); setCam2Blink(true);
      setTimeout(() => setCam2Blink(false), 4000);
    }
  }

  useEffect(() => {
    // Load existing alerts
    fetch(`${SERVER}/alerts`)
      .then(r => r.json())
      .then(data => setAlerts(data))
      .catch(() => console.log("Server not running - showing demo mode"));

    // Connect WebSocket for real-time alerts
    try {
      const socket = window.io(SERVER);
      socketRef.current = socket;

      socket.on("connect", () => {
        setConnected(true);
        console.log("Connected to fall detection server!");
      });

      socket.on("disconnect", () => setConnected(false));

      socket.on("fall_alert", (alert) => {
        setAlerts(prev => [alert, ...prev]);
        setLatestId(alert.alert_id);
        triggerBlink(alert.location, alert.person_id);
      });

      return () => socket.disconnect();
    } catch(e) {
      console.log("Running in demo mode");
    }
  }, []);

  const handleAcknowledge = (id) => {
    setAlerts(prev => prev.map(a => a.alert_id === id ? {...a, status:"acknowledged"} : a));
  };

  const filtered = filter === "all" ? alerts
    : filter === "new" ? alerts.filter(a => a.status === "unacknowledged")
    : alerts.filter(a => a.status === "acknowledged");

  const newCount = alerts.filter(a => a.status === "unacknowledged").length;

  return (
    <div style={{ minHeight:"100vh", background:"#f8fafc" }}>
      {/* Header */}
      <div style={{ background:"#1e293b", padding:"16px 28px",
        display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ fontSize:24 }}>🛡️</span>
          <div>
            <div style={{ color:"#fff", fontWeight:700, fontSize:17 }}>Fall Detection Dashboard</div>
            <div style={{ color:"#94a3b8", fontSize:12 }}>Public Safety Monitoring System · YOLOv8</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          {newCount > 0 && (
            <div style={{ background:"#dc2626", color:"#fff", borderRadius:20,
              padding:"4px 12px", fontWeight:700, fontSize:13 }}>
              🔔 {newCount} New Alert{newCount>1?"s":""}
            </div>
          )}
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:10, height:10, borderRadius:"50%",
              background: connected?"#22c55e":"#f59e0b" }}/>
            <span style={{ color: connected?"#22c55e":"#f59e0b", fontSize:13, fontWeight:600 }}>
              {connected ? "CONNECTED" : "DEMO MODE"}
            </span>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:960, margin:"0 auto", padding:"28px 16px" }}>
        {/* Stats */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:28 }}>
          <StatCard icon="📊" label="Total Falls Logged" value={alerts.length} />
          <StatCard icon="🔔" label="New Alerts" value={newCount} color="#dc2626" />
          <StatCard icon="⚡" label="Avg Alert Speed" value="1.8s" color="#2563eb" />
          <StatCard icon="🎯" label="Detection Accuracy" value="92.4%" color="#16a34a" />
        </div>

        {/* Camera Feeds */}
        <div style={{ background:"#1e293b", borderRadius:14, padding:20, marginBottom:24 }}>
          <div style={{ color:"#94a3b8", fontSize:12, fontWeight:600, marginBottom:12 }}>
            📹 LIVE CAMERA FEEDS
            {!connected && <span style={{ color:"#f59e0b", marginLeft:10 }}>
              (Start server.py to see live feed)
            </span>}
          </div>
          <div style={{ display:"flex", gap:12 }}>
            <CameraFeed
              name="Camera-1"
              blinking={cam1Blink}
              personId={cam1Person}
              streamUrl={connected ? `${SERVER}/video_feed` : null}
            />
            <CameraFeed
              name="Camera-2"
              blinking={cam2Blink}
              personId={cam2Person}
              streamUrl={null}
            />
          </div>
        </div>

        {/* Alerts */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <h2 style={{ margin:0, fontSize:17, fontWeight:700, color:"#111" }}>Fall Alerts</h2>
          <div style={{ display:"flex", gap:6 }}>
            {["all","new","resolved"].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{
                padding:"5px 14px", borderRadius:20, border:"1px solid #e5e7eb",
                background:filter===f?"#2563eb":"#fff",
                color:filter===f?"#fff":"#374151",
                fontWeight:600, fontSize:12, cursor:"pointer", textTransform:"capitalize"
              }}>{f}</button>
            ))}
          </div>
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {filtered.length === 0 ? (
            <div style={{ textAlign:"center", padding:"40px 0", color:"#9ca3af" }}>
              <div style={{ fontSize:36, marginBottom:8 }}>✅</div>
              <div>No alerts yet. Start server.py and trigger a fall!</div>
            </div>
          ) : filtered.map(alert => (
            <AlertCard key={alert.alert_id} alert={alert}
              onAcknowledge={handleAcknowledge}
              isLatest={alert.alert_id === latestId} />
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
